<!DOCTYPE html>
<html>
<head>
  <title>GlanceAI Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      max-width: 420px;
      color: #202124;
      font-size: 13px;
    }
    h1 { font-size: 18px; color: #1a73e8; margin: 0 0 20px; }
    .section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #f1f3f4;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: #5f6368;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #1a73e8;
    }
    .description {
      font-size: 11px;
      color: #9aa0a6;
      margin-top: 6px;
    }
    button {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #1557b0; }
    #status { font-size: 12px; color: #5f6368; margin-top: 10px; min-height: 16px; }
  </style>
</head>
<body>
  <h1>GlanceAI Options</h1>

  <div class="section">
    <label for="apiKey">Groq API Key</label>
    <input type="text" id="apiKey" placeholder="gsk_...">
    <p class="description">Get a free key at <a href="https://console.groq.com" target="_blank">console.groq.com</a></p>
  </div>

  <div class="section">
    <label for="summaryFormat">Summary Format</label>
    <select id="summaryFormat">
      <option value="concise">2 sentences (default)</option>
      <option value="bullets">Bullet points</option>
      <option value="eli5">Explain like I'm 5</option>
      <option value="pros-cons">Pros &amp; cons</option>
    </select>
    <p class="description">Controls how the AI structures each summary.</p>
  </div>

  <button id="save">Save</button>
  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
