<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 { font-size: 15px; font-weight: 600; color: #1a73e8; }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: #5f6368;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    input[type="password"]:focus { border-color: #1a73e8; }
    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      margin-top: 8px;
    }
    .btn-save { background: #1a73e8; color: #fff; }
    .btn-save:hover { background: #1557b0; }
    .btn-activate { background: #e8f0fe; color: #1a73e8; margin-top: 4px; }
    .btn-activate:hover { background: #d2e3fc; }
    .status { font-size: 11px; color: #5f6368; margin-top: 6px; min-height: 14px; }
    .divider { border: none; border-top: 1px solid #f1f3f4; margin: 12px 0; }
    .hint { font-size: 11px; color: #9aa0a6; text-align: center; margin-top: 6px; }
    .warning {
      background: #fce8e6;
      color: #c5221f;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 11px;
      margin-bottom: 12px;
    }
    a { color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" width="20" height="20" alt="">
    <h1>GlanceAI</h1>
  </div>

  <div id="warning" class="warning" style="display:none">
    No API key set. <a href="https://console.groq.com" target="_blank">Get one free →</a>
  </div>

  <label for="apiKey">Groq API Key</label>
  <input type="password" id="apiKey" placeholder="gsk_...">
  <button class="btn btn-save" id="save">Save Key</button>
  <div class="status" id="status"></div>

  <hr class="divider">

  <button class="btn btn-activate" id="activate">⚡ Activate on this tab</button>
  <p class="hint">or press <strong>Alt+Shift+G</strong> on Google Search</p>

  <script src="popup.js"></script>
</body>
</html>
